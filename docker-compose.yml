version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: vero-postgres
    environment:
      POSTGRES_DB: vero
      POSTGRES_USER: vero
      POSTGRES_PASSWORD: vero_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: vero-redis
    ports:
      - "6379:6379"

  analytics:
    build:
      context: ./analytics
    container_name: vero-analytics
    environment:
      - PORT=8000
    ports:
      - "8000:8000"

  api:
    build:
      context: ./api
    container_name: vero-api
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://vero:vero_password@postgres:5432/vero
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=change_me_access_secret
      - JWT_REFRESH_SECRET=change_me_refresh_secret
      - ANALYTICS_URL=http://analytics:8000
    depends_on:
      - postgres
      - redis
      - analytics
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: vero-frontend
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres_data:
